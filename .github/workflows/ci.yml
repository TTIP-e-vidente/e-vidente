name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  guardrails:
    name: Guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate repository structure
        shell: bash
        run: |
          set -euo pipefail

          REQUIRED_DIRS=(
            "project"
            "project/interface"
            "project/items"
            "project/niveles"
            "project/resources"
            "project/tests"
            "scripts"
            "wiki"
          )

          REQUIRED_FILES=(
            "README.md"
            "project/project.godot"
            "project/export_presets.cfg"
            "scripts/run-godot-validation.sh"
            "scripts/run-godot-validation.ps1"
            "wiki/Home.md"
            "wiki/Bitacora.md"
            "wiki/CI.md"
          )

          MISSING_DIRS=""
          MISSING_FILES=""

          for d in "${REQUIRED_DIRS[@]}"; do
            if [ ! -d "$d" ]; then
              MISSING_DIRS="$MISSING_DIRS- $d\n"
            fi
          done

          for f in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$f" ]; then
              MISSING_FILES="$MISSING_FILES- $f\n"
            fi
          done

          if [ -n "$MISSING_DIRS" ] || [ -n "$MISSING_FILES" ]; then
            echo "::error title=Guardrails: estructura invalida::Faltan rutas requeridas del repo. Revisar el resumen del paso."
            {
              echo "### Guardrails failed"
              echo "- Motivo: faltan rutas requeridas del repo."
              if [ -n "$MISSING_DIRS" ]; then
                echo "- Directorios faltantes:"
                printf '%b' "$MISSING_DIRS"
              fi
              if [ -n "$MISSING_FILES" ]; then
                echo "- Archivos faltantes:"
                printf '%b' "$MISSING_FILES"
              fi
            } >> "$GITHUB_STEP_SUMMARY"
            if [ -n "$MISSING_DIRS" ]; then
              echo "Directorios faltantes:"
              printf '%b' "$MISSING_DIRS"
            fi
            if [ -n "$MISSING_FILES" ]; then
              echo "Archivos faltantes:"
              printf '%b' "$MISSING_FILES"
            fi
            exit 1
          fi

      - name: Run ESLint when configured
        shell: bash
        run: |
          set -euo pipefail

          HAS_PACKAGE_JSON=0
          HAS_NPM_LOCK=0
          HAS_ESLINT_CONFIG=0

          if [ -f package.json ]; then
            HAS_PACKAGE_JSON=1
          fi

          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            HAS_NPM_LOCK=1
          fi

          if [ -f eslint.config.js ] || [ -f eslint.config.mjs ] || [ -f .eslintrc ] || [ -f .eslintrc.json ] || [ -f .eslintrc.js ] || [ -f .eslintrc.cjs ] || [ -f .eslintrc.yaml ] || [ -f .eslintrc.yml ]; then
            HAS_ESLINT_CONFIG=1
          fi

          if [ "$HAS_ESLINT_CONFIG" -eq 0 ]; then
            echo "No hay configuracion ESLint en este repo."
            exit 0
          fi

          if [ "$HAS_PACKAGE_JSON" -ne 1 ]; then
            echo "::error title=Guardrails: ESLint incompleto::Hay configuracion de ESLint pero falta package.json"
            {
              echo "### Guardrails failed"
              echo "- Motivo: el repo trae configuracion ESLint, pero no trae package.json."
              echo "- Accion: completar el stack Node del repo o quitar la configuracion huérfana."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          if [ "$HAS_NPM_LOCK" -ne 1 ]; then
            echo "::error title=Guardrails: lockfile faltante::Hay configuracion de ESLint pero falta package-lock.json o npm-shrinkwrap.json"
            {
              echo "### Guardrails failed"
              echo "- Motivo: ESLint esta configurado pero falta lockfile deterministico de npm."
              echo "- Accion: generar y commitear package-lock.json o npm-shrinkwrap.json."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          if ! npm ci --ignore-scripts; then
            echo "::error title=Guardrails: npm ci fallo::No se pudieron instalar dependencias para correr ESLint. Revisar package.json y lockfile."
            {
              echo "### Guardrails failed"
              echo "- Motivo: npm ci fallo antes de correr ESLint."
              echo "- Accion: revisar consistencia entre package.json y lockfile."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          if ! npx eslint . --max-warnings=0; then
            echo "::error title=Guardrails: ESLint fallo::ESLint encontro errores o warnings bloqueantes. Revisar la salida del paso."
            {
              echo "### Guardrails failed"
              echo "- Motivo: ESLint encontro problemas bloqueantes."
              echo "- Accion: corregir la salida reportada por ESLint."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Wiki reminder
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          BASE_SHA=""
          HEAD_SHA=""

          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_SHA="$PR_BASE_SHA"
            HEAD_SHA="$PR_HEAD_SHA"
          else
            BASE_SHA="$GITHUB_BEFORE"
            HEAD_SHA="$GITHUB_SHA"
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="HEAD~1"
          fi

          if [ -z "$HEAD_SHA" ]; then
            HEAD_SHA="HEAD"
          fi

          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No changed files detected for wiki reminder check."
            exit 0
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -q '^project/'; then
            if ! echo "$CHANGED_FILES" | grep -q '^wiki/Bitacora.md$'; then
              echo "::warning::Cambios en project/ sin actualizar wiki/Bitacora.md. Revisar si falta registrar la decision tecnica."
            else
              echo "Project y Bitacora actualizados juntos."
            fi
          else
            echo "No hubo cambios en project/."
          fi

      - name: CI contract summary
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### CI contract"
            echo "- Bloqueante: Guardrails y Core Validation."
            echo "- Guardrails cubre estructura requerida y ESLint cuando este configurado."
            echo "- Asistivo: Wiki reminder."
            echo "- Sin export web en CI para mantener el gate enfocado."
          } >> "$GITHUB_STEP_SUMMARY"

  validate:
    name: Core Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: barichello/godot-ci:4.6.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Godot validation suite
        env:
          EVIDENTE_VALIDATION_LOG_DIR: ${{ runner.temp }}/e-vidente-validation
        shell: bash
        run: |
          set -euo pipefail
          sh scripts/run-godot-validation.sh --run godot

      - name: Upload validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-logs-${{ github.run_number }}
          path: ${{ runner.temp }}/e-vidente-validation
          retention-days: 7
          if-no-files-found: warn