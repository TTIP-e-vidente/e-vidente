name: CI Branch
run-name: "${{ github.event_name == 'push' && format('Push {0}: full validation', github.ref_name) || github.event_name == 'schedule' && 'Nightly: full validation' || (inputs.run_web_export && format('Manual {0}: validation + web export', github.ref_name)) || format('Manual {0}: validation only', github.ref_name) }}"

on:
  push:
    branches:
      - main
      - dev
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      run_web_export:
        description: "Run optional Web Export build"
        required: false
        default: false
        type: boolean

concurrency:
  group: godot-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  branch-validation:
    name: "${{ github.event_name == 'push' && format('Push {0}', github.ref_name) || github.event_name == 'schedule' && 'Nightly' || (inputs.run_web_export && format('Manual {0} + web export', github.ref_name)) || format('Manual {0}', github.ref_name) }}"
    uses: ./.github/workflows/ci-shared.yml
    with:
      trigger_kind: ${{ github.event_name }}
      ref_name: ${{ github.ref_name }}
      before_sha: ${{ github.event.before || '' }}
      head_sha: ${{ github.sha }}
      run_web_export: ${{ github.event_name == 'workflow_dispatch' && inputs.run_web_export || false }}