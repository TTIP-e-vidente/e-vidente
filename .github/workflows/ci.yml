name: Godot CI - Guardrails, Core Validation and Optional Web Export

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      run_web_export:
        description: "Run optional Web Export build"
        required: false
        default: false
        type: boolean

concurrency:
  group: godot-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: "Guardrails: Structure, Docs and Optional ESLint"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Guardrail: Required repository structure"
        shell: bash
        run: |
          set -euo pipefail
          missing=0

          REQUIRED_DIRS=(
            ".github/workflows"
            "project"
            "project/interface"
            "project/items"
            "project/niveles"
            "project/resources"
            "wiki"
          )

          REQUIRED_FILES=(
            "README.md"
            "project/project.godot"
            "project/export_presets.cfg"
            "wiki/Home.md"
            "wiki/Getting-Started.md"
          )

          for d in "${REQUIRED_DIRS[@]}"; do
            if [ ! -d "$d" ]; then
              echo "::error::Missing required directory: $d. Create it or update REQUIRED_DIRS in .github/workflows/ci.yml"
              missing=1
            fi
          done

          for f in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f. Create it or update REQUIRED_FILES in .github/workflows/ci.yml"
              missing=1
            fi
          done

          if [ "$missing" -eq 0 ]; then
            echo "Repository structure looks good."
          else
            echo "::error::Repository structure guardrail failed. Fix missing required paths/files before merging."
            exit 1
          fi

      - name: "Guardrail: ESLint (runs only when configured)"
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          HAS_PACKAGE_JSON=0
          HAS_ESLINT_CONFIG=0

          if [ -f package.json ]; then
            HAS_PACKAGE_JSON=1
          fi

          if [ -f eslint.config.js ] || [ -f eslint.config.mjs ] || [ -f .eslintrc ] || [ -f .eslintrc.json ] || [ -f .eslintrc.js ] || [ -f .eslintrc.cjs ] || [ -f .eslintrc.yaml ] || [ -f .eslintrc.yml ]; then
            HAS_ESLINT_CONFIG=1
          fi

          if [ "$HAS_PACKAGE_JSON" -eq 1 ] && [ "$HAS_ESLINT_CONFIG" -eq 1 ]; then
            echo "ESLint configuration detected. Running lint (non-blocking guardrail)..."
            npm ci
            npx eslint . --max-warnings=9999
          else
            echo "::notice::Skipping ESLint: no Node/ESLint config detected in this repository."
          fi

      - name: "Guardrail: Required docs baseline"
        shell: bash
        run: |
          set -euo pipefail

          if [ -f README.md ] && [ -s README.md ]; then
            echo "README.md present."
          else
            echo "::warning::README.md missing or empty. Add project overview and setup details."
          fi

          if [ -f wiki/Home.md ] && [ -s wiki/Home.md ]; then
            echo "wiki/Home.md present."
          else
            echo "::warning::wiki/Home.md missing or empty. Add wiki entry point page."
          fi

          if [ -f wiki/Bitacora.md ] && [ -s wiki/Bitacora.md ]; then
            echo "wiki/Bitacora.md present."
          else
            echo "::warning::wiki/Bitacora.md missing or empty. Add/update changelog notes."
          fi

      - name: "Guardrail: Wiki reminder when project files change"
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          BASE_SHA=""
          HEAD_SHA=""

          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_SHA="$PR_BASE_SHA"
            HEAD_SHA="$PR_HEAD_SHA"
          else
            BASE_SHA="$GITHUB_BEFORE"
            HEAD_SHA="$GITHUB_SHA"
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="HEAD~1"
          fi

          if [ -z "$HEAD_SHA" ]; then
            HEAD_SHA="HEAD"
          fi

          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No changed files detected for wiki reminder check."
            exit 0
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -q '^project/'; then
            if ! echo "$CHANGED_FILES" | grep -q '^wiki/'; then
              echo "::warning::Project files changed without wiki updates. Consider updating wiki/Bitacora.md or wiki/Home.md to keep docs aligned."
            else
              echo "Project and wiki changed together. Good."
            fi
          else
            echo "No project/ changes detected."
          fi

      - name: "Guardrail: Publish quality summary and annotations"
        if: always()
        continue-on-error: true
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          REQUIRED_DIRS=(
            ".github/workflows"
            "project"
            "project/interface"
            "project/items"
            "project/niveles"
            "project/resources"
            "wiki"
          )

          REQUIRED_FILES=(
            "README.md"
            "project/project.godot"
            "project/export_presets.cfg"
            "wiki/Home.md"
            "wiki/Getting-Started.md"
          )

          missing_structure=0
          for d in "${REQUIRED_DIRS[@]}"; do
            [ -d "$d" ] || missing_structure=$((missing_structure + 1))
          done
          for f in "${REQUIRED_FILES[@]}"; do
            [ -f "$f" ] || missing_structure=$((missing_structure + 1))
          done

          missing_docs=0
          [ -s README.md ] || missing_docs=$((missing_docs + 1))
          [ -s wiki/Home.md ] || missing_docs=$((missing_docs + 1))
          [ -s wiki/Bitacora.md ] || missing_docs=$((missing_docs + 1))

          eslint_status="skipped"
          if [ -f package.json ] && ( [ -f eslint.config.js ] || [ -f eslint.config.mjs ] || [ -f .eslintrc ] || [ -f .eslintrc.json ] || [ -f .eslintrc.js ] || [ -f .eslintrc.cjs ] || [ -f .eslintrc.yaml ] || [ -f .eslintrc.yml ] ); then
            eslint_status="configured"
          fi

          BASE_SHA=""
          HEAD_SHA=""
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_SHA="$PR_BASE_SHA"
            HEAD_SHA="$PR_HEAD_SHA"
          else
            BASE_SHA="$GITHUB_BEFORE"
            HEAD_SHA="$GITHUB_SHA"
          fi
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="HEAD~1"
          fi
          if [ -z "$HEAD_SHA" ]; then
            HEAD_SHA="HEAD"
          fi

          changed_files=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)
          wiki_reminder="no"
          if [ -n "$changed_files" ] && echo "$changed_files" | grep -q '^project/' && ! echo "$changed_files" | grep -q '^wiki/'; then
            wiki_reminder="yes"
          fi

          summary="QUALITY SUMMARY | structure_missing=$missing_structure | docs_missing=$missing_docs | eslint=$eslint_status | wiki_update_reminder=$wiki_reminder"
          echo "$summary"
          echo "::notice::$summary"
          if [ "$missing_structure" -gt 0 ]; then
            echo "::error::Guardrail structure check found $missing_structure missing required paths/files."
          fi
          if [ "$missing_docs" -gt 0 ]; then
            echo "::warning::Guardrail docs baseline found $missing_docs missing/empty required docs files."
          fi
          if [ "$wiki_reminder" = "yes" ]; then
            echo "::warning::Project code changed without wiki updates. Review wiki/Bitacora.md or wiki/Home.md."
          fi
          {
            echo "### Quality"
            echo "$summary"
          } >> "$GITHUB_STEP_SUMMARY"

  validate:
    name: "Core Validation: Godot tests"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    container:
      image: barichello/godot-ci:4.6.2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Validation: Restore Godot import cache"
        continue-on-error: true
        uses: actions/cache@v4
        with:
          path: project/.godot
          key: godot-4.6.2-${{ hashFiles('project/project.godot', 'project/export_presets.cfg', 'project/**/*.import', 'project/**/*.tscn', 'project/**/*.tres', 'project/**/*.res', 'project/**/*.uid', 'project/assets-sistema/**/*', 'project/items/**/*', 'project/resources/**/*') }}
          restore-keys: |
            godot-4.6.2-

      - name: "Validation (PR): Decide validation profile"
        if: github.event_name == 'pull_request'
        id: pr_validation_profile
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          sh scripts/ci/detect-validation-profile.sh

      - name: "Validation (PR fast): Shared smoke suite for non-project changes"
        if: github.event_name == 'pull_request' && steps.pr_validation_profile.outputs.profile == 'pr-fast'
        shell: bash
        env:
          EVIDENTE_VALIDATION_LOG_DIR: ${{ github.workspace }}/validation-logs
        run: |
          set -euo pipefail
          sh scripts/run-godot-validation.sh --run pr-fast godot

      - name: "Validation (full): Shared Godot suite"
        if: github.event_name != 'pull_request' || steps.pr_validation_profile.outputs.profile == 'full'
        shell: bash
        env:
          EVIDENTE_VALIDATION_LOG_DIR: ${{ github.workspace }}/validation-logs
        run: |
          set -euo pipefail
          sh scripts/run-godot-validation.sh --run full godot

      - name: "Validation: Upload logs artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-validation-logs-run-${{ github.run_number }}-attempt-${{ github.run_attempt }}
          path: validation-logs
          if-no-files-found: warn
          retention-days: 14

  build-web:
    name: Optional Web Export Build (manual, main/dev)
    if: github.event_name == 'workflow_dispatch' && inputs.run_web_export == true && (github.ref_name == 'main' || github.ref_name == 'dev')
    continue-on-error: true
    runs-on: ubuntu-latest
    needs:
      - validate
      - quality
    timeout-minutes: 20
    container:
      image: barichello/godot-ci:4.6.2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: "Web Export: Restore Godot import cache"
        continue-on-error: true
        uses: actions/cache@v4
        with:
          path: project/.godot
          key: godot-4.6.2-${{ hashFiles('project/project.godot', 'project/export_presets.cfg', 'project/**/*.import', 'project/**/*.tscn', 'project/**/*.tres', 'project/**/*.res', 'project/**/*.uid', 'project/assets-sistema/**/*', 'project/items/**/*', 'project/resources/**/*') }}
          restore-keys: |
            godot-4.6.2-

      - name: "Web Export: Prepare export templates"
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.local/share/godot/export_templates/
          if [ ! -d ~/.local/share/godot/export_templates/4.6.2.stable ]; then
            mv /root/.local/share/godot/export_templates/4.6.2.stable ~/.local/share/godot/export_templates/4.6.2.stable
          fi

      - name: "Web Export: Import project before export"
        run: godot --headless --path project --editor --quit

      - name: "Web Export: Build release files"
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/build/web"
          echo "=== Starting Godot web export ==="

          if ! godot --headless --verbose --path project --export-release "index" "$GITHUB_WORKSPACE/build/web/index.html" 2>&1 | tee /tmp/godot-export.log; then
            echo "=== Godot export failed ==="
            echo "::error::Web export failed. Check /tmp/godot-export.log and verify export preset name 'index'."
            echo "=== Last 200 lines of export log ==="
            tail -200 /tmp/godot-export.log || true
            echo "=== Candidate output dirs ==="
            ls -la "$GITHUB_WORKSPACE/build/web" || true
            ls -la "$GITHUB_WORKSPACE/project/export" || true
            ls -la "$GITHUB_WORKSPACE/project/build/web" || true
            exit 1
          fi

          # Some Godot setups still write to preset export_path instead of the CLI path.
          if [ ! -f "$GITHUB_WORKSPACE/build/web/index.html" ]; then
            for CANDIDATE in "$GITHUB_WORKSPACE/export" "$GITHUB_WORKSPACE/project/export" "$GITHUB_WORKSPACE/project/build/web"; do
              if [ -f "$CANDIDATE/index.html" ]; then
                echo "Copying export files from $CANDIDATE"
                cp -a "$CANDIDATE/." "$GITHUB_WORKSPACE/build/web/"
                break
              fi
            done
          fi

          echo "=== build/web final contents ==="
          ls -la "$GITHUB_WORKSPACE/build/web"

      - name: "Web Export: Verify output files"
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          echo "=== build/web contents ==="
          ls -la build/web || { echo "::warning::build/web does not exist"; exit 0; }

          HTML=$(find build/web -maxdepth 1 -type f -name '*.html' | head -1)
          test -n "$HTML" || { echo "::warning::MISSING: no html file"; exit 0; }
          echo "OK: $HTML"

          if [ ! -f build/web/index.html ]; then
            cp "$HTML" build/web/index.html
            echo "Normalized html to build/web/index.html"
          fi

          PKG=$(find build/web -maxdepth 1 -type f \( -name '*.pck' -o -name '*.zip' \) | head -1)
          if [ -n "$PKG" ]; then
            echo "OK: $PKG"
          else
            echo "::warning::MISSING: no web package (*.pck/*.zip). Optional build kept as warning; review export preset output paths."
          fi

          WASM=$(find build/web -maxdepth 1 -type f -name '*.wasm*' | head -1)
          if [ -n "$WASM" ]; then
            echo "OK: $WASM"
          else
            echo "::warning::MISSING: no wasm file. Optional build kept as warning; verify Web preset and export templates."
          fi

          echo "Checks completed (non-blocking mode)."

      - name: "Web Export: Upload build artifact"
        uses: actions/upload-artifact@v4
        with:
          name: web-export-build-run-${{ github.run_number }}-attempt-${{ github.run_attempt }}
          path: build/web
          retention-days: 14
          if-no-files-found: warn